# Film-room look: dark surfaces so the video player and the Match Pulse strip
# carry the page. Colors coordinate with PULSE_* in app.py (validated dark set).
[theme]
base = "dark"
primaryColor = "#e66767"
backgroundColor = "#0f1116"
secondaryBackgroundColor = "#1a1d24"
textColor = "#e8e6e3"
borderColor = "#2a2e38"
baseRadius = "0.75rem"
linkColor = "#e66767"

[theme.sidebar]
backgroundColor = "#14161c"
secondaryBackgroundColor = "#1f232c"
borderColor = "#2a2e38"

[client]
toolbarMode = "minimal"

[browser]
gatherUsageStats = false
